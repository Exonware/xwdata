# Source size (src/*): ~514.5 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwdata"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwdata - provides 'import xwdata' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "data",
    "manipulation",
    "processing",
    "transformation",
    "analysis",
    "exonware",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "exonware-xwdata",
]
authors = [
    { name = "eXonware Backend Team", email = "connect@exonware.com" },
]

[project.license]
text = "Apache-2.0"

[project.optional-dependencies]
# First-party XW libs composed by this package (excludes exonware-xwsystem==0.9.0.37; see lazy/full).
xw = [
    "exonware-xwdata[xw]",
]
lazy = [
    "exonware-xwdata[lazy]",
]
full = [
    "exonware-xwdata[full]",
]
dev = [
    "exonware-xwdata[dev]",
]

[project.urls]
Homepage = "https://exonware.com"
Repository = "https://github.com/exonware/xwdata"
Documentation = "https://github.com/exonware/xwdata#readme"
Subtree = "https://github.com/exonware/xwdata.git"

[tool.black]
line-length = 88
target-version = [
    "py312",
]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.hatch.version]
path = "src/exonware/xwdata/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwdata_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/.github",
]
