[pytest]
# XWData Test Configuration
# Company: eXonware.com
# Author: eXonware Backend Team
# Email: connect@exonware.com
# Version: 0.0.1.3
# Generation Date: 26-Oct-2025

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    xwdata_core: Core functionality tests (fast, high-value)
    xwdata_unit: Unit tests for individual components
    xwdata_integration: Integration tests between components
    xwdata_advance: Advance quality tests (v1.0.0+)
    xwdata_security: Security excellence tests (Priority #1)
    xwdata_usability: Usability excellence tests (Priority #2)
    xwdata_maintainability: Maintainability excellence tests (Priority #3)
    xwdata_performance: Performance excellence tests (Priority #4)
    xwdata_extensibility: Extensibility excellence tests (Priority #5)

# Test execution options (following GUIDELINES_TEST.md)
# - Verbose output (-v)
# - Short traceback (--tb=short)
# - Stop on first failure (-x)
# - Enforce marker discipline (--strict-markers)
addopts = -v --tb=short -x --strict-markers

# Coverage configuration (optional, enable if pytest-cov installed)
# addopts = 
#     -v
#     --tb=short
#     -x
#     --strict-markers
#     --cov=exonware.xwdata
#     --cov-report=term-missing
#     --cov-report=html

